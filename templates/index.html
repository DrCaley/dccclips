<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Apocalypse Will Be Clipped</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a12;
            color: #e0e0e0;
            min-height: 100vh;
            background-image: radial-gradient(ellipse at top, #1a1028 0%, #0a0a12 60%);
        }

        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 4px;
            color: #e8c547;
            text-shadow: 0 0 20px rgba(232, 197, 71, 0.3);
        }

        .series-tag {
            font-size: 0.8rem;
            color: #b44;
            font-weight: 500;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .subtitle {
            color: #888;
            margin-bottom: 24px;
            font-size: 0.9rem;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 0;
            margin-bottom: 24px;
            border-bottom: 1px solid #333;
        }

        .tab {
            padding: 10px 24px;
            font-size: 0.95rem;
            font-weight: 500;
            color: #888;
            background: none;
            border: none;
            border-bottom: 2px solid transparent;
            cursor: pointer;
            transition: color 0.2s, border-color 0.2s;
            border-radius: 0;
        }

        .tab:hover { color: #ccc; }
        .tab.active { color: #e8c547; border-bottom-color: #e8c547; }

        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        .tab-desc {
            color: #666;
            font-size: 0.85rem;
            margin-bottom: 16px;
        }

        .search-box {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            font-size: 1rem;
            border: 1px solid #2a2a3a;
            border-radius: 8px;
            background: #12121c;
            color: #fff;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: #e8c547;
        }

        button {
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 500;
            border: none;
            border-radius: 8px;
            background: #b44;
            color: #fff;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover { background: #c55; }
        button:disabled { background: #333; cursor: not-allowed; }

        .options {
            display: flex;
            gap: 16px;
            align-items: center;
            margin-bottom: 32px;
            font-size: 0.85rem;
            color: #888;
            flex-wrap: wrap;
        }

        .options label { display: flex; align-items: center; gap: 4px; }

        .options input[type="range"] {
            width: 80px;
            accent-color: #e8c547;
        }

        .options input[type="text"].filename-input {
            flex: none;
            width: 180px;
            padding: 6px 10px;
            font-size: 0.85rem;
        }

        .status {
            text-align: center;
            padding: 20px;
            color: #666;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #333;
            border-top-color: #e8c547;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .results-header {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 16px;
        }

        .match {
            background: #12121c;
            border: 1px solid #2a2a3a;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 12px;
            transition: border-color 0.2s;
        }

        .match:hover { border-color: #e8c54744; }

        .match-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .match-score {
            font-weight: 600;
            font-size: 1.1rem;
        }

        .score-high { color: #4ade80; }
        .score-mid { color: #facc15; }
        .score-low { color: #f87171; }

        .match-time {
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 0.85rem;
            color: #888;
        }

        .match-file {
            font-size: 0.8rem;
            color: #666;
            margin-bottom: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .match-text {
            font-size: 1rem;
            line-height: 1.5;
            margin-bottom: 12px;
            color: #ccc;
        }

        .match-context {
            font-size: 0.85rem;
            line-height: 1.8;
            margin-bottom: 12px;
            color: #777;
            user-select: none;
        }

        .match-context .ctx-word {
            cursor: pointer;
            padding: 2px 1px;
            border-radius: 3px;
            transition: background 0.15s, color 0.15s;
        }

        .match-context .ctx-word:hover {
            background: #2a2a3a;
        }

        .match-context .ctx-word.selected {
            color: #fff;
            font-weight: 500;
            background: rgba(232, 197, 71, 0.15);
        }

        .match-context .ctx-word.sel-start {
            border-left: 2px solid #e8c547;
            padding-left: 3px;
        }

        .match-context .ctx-word.sel-end {
            border-right: 2px solid #e8c547;
            padding-right: 3px;
        }

        .selection-hint {
            font-size: 0.75rem;
            color: #555;
            margin-bottom: 8px;
        }

        .match-time-live {
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 0.8rem;
            color: #e8c547;
            margin-left: 8px;
        }

        .match-text em {
            font-style: normal;
            color: #fff;
        }

        .match-actions {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        .btn-small {
            padding: 6px 14px;
            font-size: 0.85rem;
            border-radius: 6px;
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
        }

        .btn-small:hover { background: #3a3a3a; }

        .btn-clip-tab {
            background: #2a1a1a;
            border-color: #5a2a2a;
            color: #e8c547;
        }

        .btn-clip-tab:hover { background: #3a2a2a; }

        audio {
            height: 32px;
            flex: 1;
            max-width: 300px;
        }

        .no-results {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .no-results p { margin-bottom: 8px; }

        /* Clip result area */
        .clip-result {
            background: #12121c;
            border: 1px solid #2a2a3a;
            border-radius: 12px;
            padding: 20px;
            margin-top: 8px;
        }

        .clip-result .clip-info {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 12px;
        }

        .clip-result .clip-info strong {
            color: #ccc;
        }

        .clip-result audio {
            width: 100%;
            max-width: 100%;
            margin-bottom: 12px;
        }

        .clip-result .download-link {
            display: inline-block;
            padding: 8px 16px;
            font-size: 0.9rem;
            background: #b44;
            color: #fff;
            text-decoration: none;
            border-radius: 6px;
        }

        .clip-result .download-link:hover { background: #c55; }

        /* Popular tab */
        .popular-item {
            background: #12121c;
            border: 1px solid #2a2a3a;
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: border-color 0.2s;
        }

        .popular-item:hover { border-color: #e8c54744; }

        .popular-rank {
            font-size: 1.4rem;
            font-weight: 700;
            color: #e8c547;
            min-width: 32px;
            text-align: center;
        }

        .popular-info {
            flex: 1;
            min-width: 0;
        }

        .popular-quote {
            font-size: 1rem;
            color: #ccc;
            margin-bottom: 4px;
        }

        .popular-meta {
            font-size: 0.8rem;
            color: #666;
        }

        .popular-count {
            font-size: 0.85rem;
            font-weight: 600;
            color: #b44;
            white-space: nowrap;
        }

        .popular-actions {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .popular-empty {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .buffer-controls {
            display: flex;
            gap: 20px;
            align-items: center;
            margin-bottom: 12px;
            font-size: 0.8rem;
            color: #888;
            flex-wrap: wrap;
        }

        .buffer-controls label {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .buffer-controls input[type="range"] {
            width: 100px;
            accent-color: #e8c547;
        }

        .buffer-controls .buf-val {
            font-family: 'SF Mono', 'Fira Code', monospace;
            color: #e8c547;
            min-width: 28px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>The Apocalypse Will Be Clipped</h1>
        <p class="subtitle">Dungeon Crawler Carl Audiobook Clips</p>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('find')">Find</button>
            <button class="tab" onclick="switchTab('popular')">Popular</button>
        </div>

        <!-- FIND TAB -->
        <div id="tab-find" class="tab-panel active">
            <p class="tab-desc">Search the audiobooks for a quote. See the matched text with surrounding context to confirm it's the right moment.</p>

            <div class="search-box">
                <input type="text" id="find-quote" placeholder="e.g. don't gaslight me Jesus..."
                       autofocus autocomplete="off">
                <button id="findBtn" onclick="doSearch()">Search</button>
            </div>

            <div class="options">
                <label>
                    Threshold:
                    <input type="range" id="find-threshold" min="40" max="100" value="70">
                    <span id="findThresholdVal">70%</span>
                </label>
            </div>

            <div id="find-results"></div>
        </div>

        <!-- POPULAR TAB -->
        <div id="tab-popular" class="tab-panel">
            <p class="tab-desc">Most-requested clips, sorted by how many times they've been played.</p>
            <div id="popular-results"></div>
        </div>
    </div>

    <script>
        /* ── Tab switching ── */
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            document.querySelector(`.tab[onclick="switchTab('${tab}')"]`).classList.add('active');
            if (tab === 'find') document.getElementById('find-quote').focus();
            else if (tab === 'popular') loadPopular();
        }

        /* ── Find tab ── */
        const findThresholdSlider = document.getElementById('find-threshold');
        const findThresholdVal = document.getElementById('findThresholdVal');
        findThresholdSlider.addEventListener('input', () => {
            findThresholdVal.textContent = findThresholdSlider.value + '%';
        });

        document.getElementById('find-quote').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') doSearch();
        });

        async function doSearch() {
            const quote = document.getElementById('find-quote').value.trim();
            if (!quote) return;

            const btn = document.getElementById('findBtn');
            const results = document.getElementById('find-results');
            const threshold = parseInt(findThresholdSlider.value) / 100;

            btn.disabled = true;
            results.innerHTML = '<div class="status"><span class="spinner"></span>Searching...</div>';

            try {
                const resp = await fetch('/api/search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ quote, threshold }),
                });
                const data = await resp.json();

                if (data.error) {
                    results.innerHTML = `<div class="no-results"><p>${data.error}</p></div>`;
                    return;
                }

                if (data.count === 0) {
                    results.innerHTML = `
                        <div class="no-results">
                            <p>No matches found for "<strong>${esc(quote)}</strong>"</p>
                            <p>Try lowering the threshold or different wording.</p>
                        </div>`;
                    return;
                }

                let html = `<div class="results-header">${data.count} match${data.count !== 1 ? 'es' : ''} for "${esc(quote)}"</div>`;

                data.results.forEach((m, idx) => {
                    const scoreClass = m.score >= 90 ? 'score-high' : m.score >= 75 ? 'score-mid' : 'score-low';

                    // Build context words as clickable spans
                    let wordsHtml = '';
                    const cw = m.context_words || [];
                    cw.forEach((w, wi) => {
                        const cls = w.sel ? 'ctx-word selected' : 'ctx-word';
                        wordsHtml += `<span class="${cls}" data-idx="${wi}" data-start="${w.start}" data-end="${w.end}" data-match="${idx}">${esc(w.word)}</span> `;
                    });

                    // Fallback if no word-level data
                    if (!cw.length) {
                        wordsHtml = `...${esc(m.context_before)} <span class="selected">${esc(m.matched_text)}</span> ${esc(m.context_after)}...`;
                    }

                    html += `
                        <div class="match" id="match-${idx}">
                            <div class="match-header">
                                <span class="match-score ${scoreClass}">${m.score}%</span>
                                <span class="match-time">${m.start_fmt} → ${m.end_fmt}<span class="match-time-live" id="live-time-${idx}"></span></span>
                            </div>
                            <div class="match-file" title="${esc(m.audio_name)}" style="display:none">${esc(m.audio_name)}</div>
                            <div class="selection-hint">Click a word to adjust clip boundaries</div>
                            <div class="match-context" id="ctx-${idx}">
                                ${wordsHtml}
                            </div>
                            <div class="buffer-controls" id="buffers-${idx}">
                                <label>
                                    Start buffer:
                                    <input type="range" min="0" max="3" step="0.1" value="0.3"
                                           oninput="updateBuffer(${idx})" id="buf-start-${idx}">
                                    <span class="buf-val" id="buf-start-val-${idx}">0.3s</span>
                                </label>
                                <label>
                                    End buffer:
                                    <input type="range" min="0" max="3" step="0.1" value="0.3"
                                           oninput="updateBuffer(${idx})" id="buf-end-${idx}">
                                    <span class="buf-val" id="buf-end-val-${idx}">0.3s</span>
                                </label>
                            </div>
                            <div class="match-actions" id="actions-${idx}">
                                <button class="btn-small" data-match="${idx}" onclick="playSelection(${idx})">
                                    ▶ Play
                                </button>
                                <button class="btn-small btn-clip-tab" data-match="${idx}" onclick="downloadSelection(${idx})">
                                    ⬇ Download
                                </button>
                            </div>
                        </div>`;
                });

                results.innerHTML = html;

                // Store match data for selection logic
                window._matchData = data.results;
                window._selections = {};
                data.results.forEach((m, idx) => {
                    const cw = m.context_words || [];
                    // Find initial selection range
                    let selStart = -1, selEnd = -1;
                    cw.forEach((w, wi) => {
                        if (w.sel) {
                            if (selStart === -1) selStart = wi;
                            selEnd = wi;
                        }
                    });
                    window._selections[idx] = { start: selStart, end: selEnd };
                });

                // Attach word click handlers
                document.querySelectorAll('.ctx-word').forEach(span => {
                    span.addEventListener('click', (e) => {
                        const matchIdx = parseInt(span.getAttribute('data-match'));
                        const wordIdx = parseInt(span.getAttribute('data-idx'));
                        handleWordClick(matchIdx, wordIdx, e.shiftKey);
                    });
                });
            } catch (err) {
                results.innerHTML = `<div class="no-results"><p>Error: ${err.message}</p></div>`;
            } finally {
                btn.disabled = false;
            }
        }

        function handleWordClick(matchIdx, wordIdx, isShift) {
            const sel = window._selections[matchIdx];
            if (!sel || sel.start === -1) return;

            // Always move whichever boundary is closer
            const distToStart = Math.abs(wordIdx - sel.start);
            const distToEnd = Math.abs(wordIdx - sel.end);

            if (distToStart <= distToEnd) {
                sel.start = wordIdx;
            } else {
                sel.end = wordIdx;
            }

            // Ensure start <= end
            if (sel.start > sel.end) {
                [sel.start, sel.end] = [sel.end, sel.start];
            }

            updateSelectionUI(matchIdx);
        }

        function updateSelectionUI(matchIdx) {
            const sel = window._selections[matchIdx];
            const ctx = document.getElementById('ctx-' + matchIdx);
            if (!ctx || !sel) return;

            const spans = ctx.querySelectorAll('.ctx-word');
            spans.forEach(span => {
                const wi = parseInt(span.getAttribute('data-idx'));
                span.classList.toggle('selected', wi >= sel.start && wi <= sel.end);
                span.classList.toggle('sel-start', wi === sel.start);
                span.classList.toggle('sel-end', wi === sel.end);
            });

            // Update live time display (including buffers)
            const startSpan = ctx.querySelector(`.ctx-word[data-idx="${sel.start}"]`);
            const endSpan = ctx.querySelector(`.ctx-word[data-idx="${sel.end}"]`);
            const liveTime = document.getElementById('live-time-' + matchIdx);
            if (startSpan && endSpan && liveTime) {
                const s = parseFloat(startSpan.getAttribute('data-start'));
                const e = parseFloat(endSpan.getAttribute('data-end'));
                const startBufEl = document.getElementById('buf-start-' + matchIdx);
                const endBufEl = document.getElementById('buf-end-' + matchIdx);
                const sb = startBufEl ? parseFloat(startBufEl.value) : 0.3;
                const eb = endBufEl ? parseFloat(endBufEl.value) : 0.3;
                const clipStart = Math.max(0, s - sb);
                const clipEnd = e + eb;
                liveTime.textContent = `  ✂ ${fmtTime(clipStart)} → ${fmtTime(clipEnd)}`;
            }
        }

        function fmtTime(t) {
            const m = Math.floor(t / 60);
            const s = (t % 60).toFixed(1);
            return m + ':' + s.padStart(4, '0');
        }

        function updateBuffer(matchIdx) {
            const startBuf = document.getElementById('buf-start-' + matchIdx);
            const endBuf = document.getElementById('buf-end-' + matchIdx);
            document.getElementById('buf-start-val-' + matchIdx).textContent = parseFloat(startBuf.value).toFixed(1) + 's';
            document.getElementById('buf-end-val-' + matchIdx).textContent = parseFloat(endBuf.value).toFixed(1) + 's';
            updateSelectionUI(matchIdx);
        }

        function getSelectionTimes(matchIdx) {
            const sel = window._selections[matchIdx];
            const m = window._matchData[matchIdx];
            const startBufEl = document.getElementById('buf-start-' + matchIdx);
            const endBufEl = document.getElementById('buf-end-' + matchIdx);
            const startBuf = startBufEl ? parseFloat(startBufEl.value) : 0.3;
            const endBuf = endBufEl ? parseFloat(endBufEl.value) : 0.3;
            if (!sel || sel.start === -1) {
                return { start: m.start_time, end: m.end_time, text: m.matched_text, audio: m.audio_name, startBuf, endBuf };
            }
            const cw = m.context_words || [];
            const start = cw[sel.start]?.start ?? m.start_time;
            const end = cw[sel.end]?.end ?? m.end_time;
            const text = cw.slice(sel.start, sel.end + 1).map(w => w.word).join(' ');
            return { start, end, text, audio: m.audio_name, startBuf, endBuf };
        }

        async function playSelection(matchIdx) {
            const { start, end, text, audio, startBuf, endBuf } = getSelectionTimes(matchIdx);
            const actions = document.getElementById('actions-' + matchIdx);
            const btn = actions.querySelector('button');
            btn.disabled = true;
            btn.textContent = '⏳ Loading...';

            try {
                const resp = await fetch('/api/clip', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ audio_name: audio, start_time: start, end_time: end, matched_text: text, start_buffer: startBuf, end_buffer: endBuf }),
                });

                if (!resp.ok) throw new Error('Failed to extract clip');

                const blob = await resp.blob();
                const url = URL.createObjectURL(blob);

                let audioEl = actions.querySelector('audio');
                if (audioEl) {
                    audioEl.src = url;
                    audioEl.play();
                } else {
                    audioEl = document.createElement('audio');
                    audioEl.controls = true;
                    audioEl.autoplay = true;
                    audioEl.src = url;
                    actions.appendChild(audioEl);
                }
                btn.textContent = '▶ Play';
            } catch (err) {
                btn.textContent = '✗ Failed';
            } finally {
                btn.disabled = false;
            }
        }

        async function downloadSelection(matchIdx) {
            const { start, end, text, audio, startBuf, endBuf } = getSelectionTimes(matchIdx);
            const filename = text.slice(0, 20).trim().replace(/[^\w\s-]/g, '').replace(/\s+/g, '_').toLowerCase() + '.mp3';
            const actions = document.getElementById('actions-' + matchIdx);
            const btn = actions.querySelectorAll('button')[1];

            btn.disabled = true;
            btn.textContent = '⏳ Clipping...';

            try {
                const resp = await fetch('/api/clip', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ audio_name: audio, start_time: start, end_time: end, matched_text: text, track: true, start_buffer: startBuf, end_buffer: endBuf }),
                });
                if (!resp.ok) throw new Error('Failed');

                const blob = await resp.blob();
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);

                btn.textContent = '✓ Downloaded';
                setTimeout(() => { btn.textContent = '⬇ Download'; }, 2000);
            } catch (err) {
                btn.textContent = '✗ Failed';
                setTimeout(() => { btn.textContent = '⬇ Download'; }, 2000);
            } finally {
                btn.disabled = false;
            }
        }

        function esc(s) {
            const d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        /* ── Popular tab ── */
        async function loadPopular() {
            const results = document.getElementById('popular-results');
            results.innerHTML = '<div class="status"><span class="spinner"></span>Loading...</div>';

            try {
                const resp = await fetch('/api/popular');
                const clips = await resp.json();

                if (!clips.length) {
                    results.innerHTML = '<div class="popular-empty"><p>No clips yet.</p><p>Use Find or Clip to create some!</p></div>';
                    return;
                }

                let html = `<div class="results-header">${clips.length} clip${clips.length !== 1 ? 's' : ''}</div>`;
                clips.forEach((c, i) => {
                    const rank = i + 1;
                    html += `
                        <div class="popular-item">
                            <div class="popular-rank">${rank}</div>
                            <div class="popular-info">
                                <div class="popular-quote">${esc(c.quote || c.clip_name)}</div>
                            </div>
                            <div class="popular-actions">
                                <button class="btn-small" onclick="playPopular(this, '${esc(c.clip_name)}')">▶</button>
                                <a class="btn-small download-link" href="/api/popular/download/${encodeURIComponent(c.clip_name)}" style="text-decoration:none;text-align:center;color:#fff;">⬇</a>
                            </div>
                        </div>`;
                });
                results.innerHTML = html;
            } catch (err) {
                results.innerHTML = `<div class="no-results"><p>Error: ${err.message}</p></div>`;
            }
        }

        async function playPopular(btn, clipName) {
            btn.disabled = true;
            btn.textContent = '⏳';
            try {
                const url = '/api/popular/play/' + encodeURIComponent(clipName);
                const actions = btn.parentElement;
                let audio = actions.querySelector('audio');
                if (audio) { audio.src = url; audio.play(); }
                else {
                    audio = document.createElement('audio');
                    audio.controls = true;
                    audio.autoplay = true;
                    audio.src = url;
                    actions.appendChild(audio);
                }
                btn.textContent = '▶';
            } catch (err) {
                btn.textContent = '✗';
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
